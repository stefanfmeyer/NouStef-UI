version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-tooling:
        patterns:
          - "typescript"
          - "vitest"
          - "eslint*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "turbo"
          - "vite"
          - "@playwright/test"
