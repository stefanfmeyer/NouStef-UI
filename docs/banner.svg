<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#f7931e"/>
      <stop offset="100%" stop-color="#ffcd3c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="16"/>
  <rect width="898" height="278" fill="none" stroke="#30363d" stroke-width="1" rx="16" x="1" y="1"/>

  <!-- Subtle warm glow behind emoji -->
  <circle cx="160" cy="140" r="110" fill="#ff6b35" opacity="0.06"/>

  <!-- Large chef emoji -->
  <text x="160" y="175" font-size="130" text-anchor="middle" font-family="'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif">🧑‍🍳</text>

  <!-- Title -->
  <g>
    <text x="530" y="105" font-size="58" font-weight="900" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
          fill="url(#titleGrad)" text-anchor="middle" filter="url(#glow)" opacity="0">
      The Kitchen
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.2s" fill="freeze"/>
    </text>
  </g>

  <!-- Animated divider line that draws itself -->
  <line x1="530" y1="125" x2="530" y2="125" stroke="#ff6b35" stroke-width="1.5" opacity="0.7">
    <animate attributeName="x1" values="530;310" dur="0.7s" begin="0.9s" fill="freeze"/>
    <animate attributeName="x2" values="530;750" dur="0.7s" begin="0.9s" fill="freeze"/>
  </line>

  <!-- Subtitle -->
  <text x="530" y="155" font-size="16" font-family="'Segoe UI', system-ui, sans-serif"
        fill="#8b949e" text-anchor="middle" opacity="0">
    Local-first browser frontend for Hermes Agent
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.4s" fill="freeze"/>
  </text>

  <!-- Feature pill: Chat -->
  <g opacity="0">
    <rect x="310" y="178" width="100" height="26" rx="13" fill="#21262d" stroke="#ff6b35" stroke-width="1"/>
    <text x="360" y="195" font-size="12" font-family="'Segoe UI', system-ui, sans-serif"
          fill="#ff6b35" text-anchor="middle" font-weight="500">💬 Chat</text>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.9s" fill="freeze"/>
  </g>

  <!-- Feature pill: Recipes -->
  <g opacity="0">
    <rect x="422" y="178" width="116" height="26" rx="13" fill="#21262d" stroke="#f7931e" stroke-width="1"/>
    <text x="480" y="195" font-size="12" font-family="'Segoe UI', system-ui, sans-serif"
          fill="#f7931e" text-anchor="middle" font-weight="500">📋 Recipes</text>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.1s" fill="freeze"/>
  </g>

  <!-- Feature pill: Sessions -->
  <g opacity="0">
    <rect x="550" y="178" width="120" height="26" rx="13" fill="#21262d" stroke="#f0a500" stroke-width="1"/>
    <text x="610" y="195" font-size="12" font-family="'Segoe UI', system-ui, sans-serif"
          fill="#f0a500" text-anchor="middle" font-weight="500">🗂 Sessions</text>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.3s" fill="freeze"/>
  </g>

  <!-- Feature pill: Coding -->
  <g opacity="0">
    <rect x="682" y="178" width="110" height="26" rx="13" fill="#21262d" stroke="#ffcd3c" stroke-width="1"/>
    <text x="737" y="195" font-size="12" font-family="'Segoe UI', system-ui, sans-serif"
          fill="#ffcd3c" text-anchor="middle" font-weight="500">⌨️ Coding</text>
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.5s" fill="freeze"/>
  </g>

  <!-- Bottom tagline -->
  <text x="530" y="245" font-size="13" font-family="'Segoe UI', system-ui, sans-serif"
        fill="#484f58" text-anchor="middle" letter-spacing="2" opacity="0">
    STREAMING · STRUCTURED · LOCAL-FIRST
    <animate attributeName="opacity" values="0;1" dur="1s" begin="2.8s" fill="freeze"/>
  </text>
</svg>
